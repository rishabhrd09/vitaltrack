  <rect x="290" y="380" width="60" height="80" rx="6" fill="rgba(140,100,40,.04)" stroke="#8a6830" stroke-width="2.5" stroke-opacity=".15"/>
  <circle cx="340" cy="424" r="4" fill="#8a6830" opacity=".2"/>
