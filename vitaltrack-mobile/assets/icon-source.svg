<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- House outline: scaled down to fit safe zone -->
  <!-- Roof peak at y=105, walls from x=130 to x=382, bottom at y=410 -->
  <path d="M256,105 L382,195 L382,396 C382,408 373,416 362,416 L150,416 C139,416 130,408 130,396 L130,195 Z"
    fill="rgba(140,100,40,.03)" stroke="#8a6830" stroke-width="5.5" stroke-opacity=".42" stroke-linejoin="round"/>

  <!-- Chimney -->
  <rect x="328" y="128" width="24" height="54" rx="3" fill="#ffffff" stroke="#8a6830" stroke-width="3.5" stroke-opacity=".2"/>

  <!-- Roof ridge line -->
  <line x1="155" y1="195" x2="357" y2="195" stroke="#8a6830" stroke-width="1.8" stroke-opacity=".1"/>

  <!-- Medical cross in roof gable -->
  <rect x="235" y="137" width="42" height="10" rx="5" fill="#8a6830" opacity=".42"/>
  <rect x="251" y="126" width="10" height="34" rx="5" fill="#8a6830" opacity=".42"/>

  <!-- Shelf dividers inside house body -->
  <line x1="148" y1="265" x2="364" y2="265" stroke="#8a6830" stroke-width="2.5" stroke-opacity=".12"/>
  <line x1="148" y1="335" x2="364" y2="335" stroke="#8a6830" stroke-width="2.5" stroke-opacity=".12"/>

  <!-- ROW 1 (y=205-258): medicine bottle, syringe, IV bag, O2 cylinder -->
  <!-- medicine bottle -->
  <rect x="152" y="212" width="34" height="46" rx="6" fill="#8a6830" opacity=".08"/>
  <rect x="156" y="202" width="26" height="13" rx="3" fill="#8a6830" opacity=".06"/>
  <rect x="162" y="196" width="14" height="9" rx="2.5" fill="#8a6830" opacity=".09"/>
  <!-- syringe -->
  <rect x="202" y="208" width="15" height="52" rx="4" fill="#8a6830" opacity=".07"/>
  <rect x="205" y="198" width="9" height="13" rx="2.5" fill="#8a6830" opacity=".08"/>
  <line x1="199" y1="258" x2="220" y2="258" stroke="#8a6830" stroke-width="1.8" stroke-opacity=".07"/>
  <!-- IV bag -->
  <path d="M252,202 L300,202 L295,248 L257,248 Z" fill="#8a6830" opacity=".06"/>
  <line x1="276" y1="248" x2="276" y2="263" stroke="#8a6830" stroke-width="1.8" stroke-opacity=".08"/>
  <circle cx="276" cy="198" r="3" fill="#8a6830" opacity=".07"/>
  <!-- O2 cylinder -->
  <rect x="320" y="212" width="22" height="48" rx="11" fill="#8a6830" opacity=".06"/>
  <rect x="325" y="200" width="12" height="15" rx="3.5" fill="#8a6830" opacity=".08"/>

  <!-- ROW 2 (y=275-328): gauze roll, catheter pack, nebulizer mask, vials -->
  <!-- gauze roll -->
  <circle cx="168" cy="300" r="20" fill="none" stroke="#8a6830" stroke-width="3" stroke-opacity=".07"/>
  <circle cx="168" cy="300" r="8" fill="#8a6830" opacity=".05"/>
  <!-- catheter/tube pack -->
  <rect x="208" y="282" width="46" height="32" rx="6" fill="#8a6830" opacity=".06"/>
  <line x1="215" y1="291" x2="246" y2="291" stroke="#8a6830" stroke-width="1.5" stroke-opacity=".05"/>
  <line x1="215" y1="300" x2="242" y2="300" stroke="#8a6830" stroke-width="1.5" stroke-opacity=".04"/>
  <line x1="215" y1="309" x2="238" y2="309" stroke="#8a6830" stroke-width="1.5" stroke-opacity=".04"/>
  <!-- nebulizer mask -->
  <ellipse cx="296" cy="300" rx="18" ry="21" fill="#8a6830" opacity=".06"/>
  <ellipse cx="296" cy="300" rx="10" ry="13" fill="#8a6830" opacity=".03"/>
  <!-- vials -->
  <rect x="332" y="282" width="12" height="30" rx="4" fill="#8a6830" opacity=".07"/>
  <rect x="348" y="286" width="10" height="25" rx="3.5" fill="#8a6830" opacity=".05"/>

  <!-- ROW 3 (y=345-408): heartbeat line + door -->
  <!-- heartbeat line -->
  <polyline points="148,375 172,375 180,360 190,390 198,368 206,375 240,375"
    fill="none" stroke="#8a6830" stroke-width="2" stroke-opacity=".1"/>
  <!-- Door shape (home feel) -->
  <rect x="280" y="352" width="48" height="62" rx="5" fill="rgba(140,100,40,.04)" stroke="#8a6830" stroke-width="2" stroke-opacity=".15"/>
  <circle cx="320" cy="387" r="3.5" fill="#8a6830" opacity=".2"/>
</svg>
