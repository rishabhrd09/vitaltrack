<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- House outline: roof + body -->
  <path d="M256,62 L406,178 L406,440 C406,456 394,468 378,468 L134,468 C118,468 106,456 106,440 L106,178 Z"
