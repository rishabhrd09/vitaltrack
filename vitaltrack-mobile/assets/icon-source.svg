  <circle cx="288" cy="180" r="3.5" fill="#8a6830" opacity=".07"/>
  <rect x="338" y="196" width="26" height="64" rx="13" fill="#8a6830" opacity=".06"/>
  <rect x="344" y="182" width="14" height="18" rx="4" fill="#8a6830" opacity=".08"/>

  <!-- ROW 2: gauze roll, catheter pack, nebulizer mask, vials -->
  <circle cx="162" cy="314" r="24" fill="none" stroke="#8a6830" stroke-width="3.5" stroke-opacity=".07"/>
  <circle cx="162" cy="314" r="10" fill="#8a6830" opacity=".05"/>
  <rect x="210" y="294" width="56" height="38" rx="8" fill="#8a6830" opacity=".06"/>
  <line x1="218" y1="304" x2="256" y2="304" stroke="#8a6830" stroke-width="1.8" stroke-opacity=".05"/>
  <line x1="218" y1="314" x2="252" y2="314" stroke="#8a6830" stroke-width="1.8" stroke-opacity=".04"/>
  <line x1="218" y1="324" x2="248" y2="324" stroke="#8a6830" stroke-width="1.8" stroke-opacity=".04"/>
  <ellipse cx="310" cy="314" rx="22" ry="26" fill="#8a6830" opacity=".06"/>
  <ellipse cx="310" cy="314" rx="12" ry="16" fill="#8a6830" opacity=".03"/>
