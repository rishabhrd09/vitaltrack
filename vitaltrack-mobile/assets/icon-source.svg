  <rect x="266" y="210" width="88" height="110" rx="8" fill="#604820" opacity=".1"/>
  <rect x="278" y="226" width="8" height="8" rx="2" fill="#604820" opacity=".14"/>
  <line x1="292" y1="230" x2="340" y2="230" stroke="#604820" stroke-width="2.5" stroke-opacity=".12"/>
  <rect x="278" y="248" width="8" height="8" rx="2" fill="#604820" opacity=".14"/>
  <line x1="292" y1="252" x2="336" y2="252" stroke="#604820" stroke-width="2.5" stroke-opacity=".12"/>
  <rect x="278" y="270" width="8" height="8" rx="2" fill="#604820" opacity=".14"/>
  <line x1="292" y1="274" x2="332" y2="274" stroke="#604820" stroke-width="2.5" stroke-opacity=".12"/>
  <rect x="278" y="292" width="8" height="8" rx="2" fill="#604820" opacity=".12"/>
  <line x1="292" y1="296" x2="338" y2="296" stroke="#604820" stroke-width="2.5" stroke-opacity=".1"/>

