  <line x1="130" y1="268" x2="382" y2="268" stroke="#8a6830" stroke-width="3" stroke-opacity=".12"/>
  <line x1="130" y1="358" x2="382" y2="358" stroke="#8a6830" stroke-width="3" stroke-opacity=".12"/>

  <!-- ROW 1: medicine bottle, syringe, IV bag, O2 cylinder -->
  <rect x="140" y="196" width="40" height="62" rx="7" fill="#8a6830" opacity=".08"/>
  <rect x="145" y="184" width="30" height="16" rx="4" fill="#8a6830" opacity=".06"/>
