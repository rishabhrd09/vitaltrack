<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Clipboard body — transparent bg -->
  <rect x="30" y="40" width="140" height="150" rx="14"
    fill="rgba(180,150,100,.06)" stroke="#b0905a" stroke-width="5" stroke-opacity=".45"/>

  <!-- Clip at top -->
  <rect x="65" y="22" width="70" height="30" rx="10"
    fill="rgba(255,255,255,.08)" stroke="#b0905a" stroke-width="4.5" stroke-opacity=".38"/>

  <!-- Checklist items -->
  <rect x="50" y="78" width="8" height="8" rx="2" fill="#b0905a" opacity=".42"/>
  <line x1="66" y1="82" x2="110" y2="82"
    stroke="#b0905a" stroke-width="4" stroke-opacity=".3"/>

  <rect x="50" y="104" width="8" height="8" rx="2" fill="#b0905a" opacity=".36"/>
  <line x1="66" y1="108" x2="106" y2="108"
    stroke="#b0905a" stroke-width="4" stroke-opacity=".26"/>

  <rect x="50" y="130" width="8" height="8" rx="2" fill="#b0905a" opacity=".3"/>
  <line x1="66" y1="134" x2="112" y2="134"
    stroke="#b0905a" stroke-width="4" stroke-opacity=".22"/>

  <rect x="50" y="156" width="8" height="8" rx="2" fill="#b0905a" opacity=".24"/>
  <line x1="66" y1="160" x2="100" y2="160"
    stroke="#b0905a" stroke-width="4" stroke-opacity=".18"/>

  <!-- Small medical cross in top-right -->
  <rect x="120" y="72" width="30" height="8" rx="4" fill="#b0905a" opacity=".42"/>
  <rect x="131" y="66" width="8" height="20" rx="4" fill="#b0905a" opacity=".42"/>
</svg>
