<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Clipboard body — transparent bg for light/dark theme compositing -->
  <rect x="30" y="40" width="140" height="150" rx="14"
    fill="rgba(138,104,48,.05)" stroke="#8a6830" stroke-width="5" stroke-opacity=".38"/>

  <!-- Clip at top -->
  <rect x="65" y="22" width="70" height="30" rx="10"
    fill="#fff" stroke="#8a6830" stroke-width="4.5" stroke-opacity=".32"/>

  <!-- Checklist: 4 checkbox squares + lines (left side, going down) -->
  <!-- Item 1 -->
  <rect x="50" y="78" width="8" height="8" rx="2" fill="#8a6830" opacity=".35"/>
  <line x1="66" y1="82" x2="110" y2="82"
    stroke="#8a6830" stroke-width="4" stroke-opacity=".2"/>

  <!-- Item 2 -->
  <rect x="50" y="104" width="8" height="8" rx="2" fill="#8a6830" opacity=".3"/>
  <line x1="66" y1="108" x2="106" y2="108"
    stroke="#8a6830" stroke-width="4" stroke-opacity=".18"/>

  <!-- Item 3 -->
  <rect x="50" y="130" width="8" height="8" rx="2" fill="#8a6830" opacity=".25"/>
  <line x1="66" y1="134" x2="112" y2="134"
    stroke="#8a6830" stroke-width="4" stroke-opacity=".15"/>

  <!-- Item 4 -->
  <rect x="50" y="156" width="8" height="8" rx="2" fill="#8a6830" opacity=".2"/>
  <line x1="66" y1="160" x2="100" y2="160"
    stroke="#8a6830" stroke-width="4" stroke-opacity=".12"/>

  <!-- Small medical cross in top-right corner area -->
  <rect x="120" y="72" width="30" height="8" rx="4" fill="#8a6830" opacity=".35"/>
  <rect x="131" y="66" width="8" height="20" rx="4" fill="#8a6830" opacity=".35"/>
</svg>
