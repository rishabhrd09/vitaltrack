<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark-mode companion to icon-mark.svg. Warm gold #d4b670 strokes on a
       fully transparent background, with a subtle tinted clip fill (no white
       rectangle clashing with the dark top bar). Opacities bumped ~20% over
       the light-mode mark since the lighter color reads less densely. -->

  <!-- Clipboard body -->
  <rect x="30" y="40" width="140" height="150" rx="14"
    fill="rgba(212,182,112,.08)" stroke="#d4b670" stroke-width="5" stroke-opacity=".62"/>

  <!-- Clip -->
  <rect x="65" y="22" width="70" height="30" rx="10"
    fill="rgba(212,182,112,.12)" stroke="#d4b670" stroke-width="4.5" stroke-opacity=".52"/>

  <!-- Checklist items -->
  <rect x="50" y="78" width="8" height="8" rx="2" fill="#d4b670" opacity=".6"/>
  <line x1="66" y1="82" x2="110" y2="82"
    stroke="#d4b670" stroke-width="4" stroke-opacity=".38"/>

  <rect x="50" y="104" width="8" height="8" rx="2" fill="#d4b670" opacity=".52"/>
  <line x1="66" y1="108" x2="106" y2="108"
    stroke="#d4b670" stroke-width="4" stroke-opacity=".34"/>

  <rect x="50" y="130" width="8" height="8" rx="2" fill="#d4b670" opacity=".44"/>
  <line x1="66" y1="134" x2="112" y2="134"
    stroke="#d4b670" stroke-width="4" stroke-opacity=".28"/>

  <rect x="50" y="156" width="8" height="8" rx="2" fill="#d4b670" opacity=".36"/>
  <line x1="66" y1="160" x2="100" y2="160"
    stroke="#d4b670" stroke-width="4" stroke-opacity=".22"/>

  <!-- Medical cross -->
  <rect x="120" y="72" width="30" height="8" rx="4" fill="#d4b670" opacity=".68"/>
  <rect x="131" y="66" width="8" height="20" rx="4" fill="#d4b670" opacity=".68"/>
</svg>
