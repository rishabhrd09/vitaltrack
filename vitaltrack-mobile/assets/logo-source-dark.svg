<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background — parent (login/register screen) provides the dark bg. -->

  <!-- House outline — subtle warm amber on dark -->
  <path d="M256,105 L382,195 L382,396 C382,408 373,416 362,416 L150,416 C139,416 130,408 130,396 L130,195 Z"
    fill="transparent" stroke="#c4a060" stroke-width="4" stroke-opacity=".3" stroke-linejoin="round"/>

  <!-- NO ROOF CROSS — only cross is inside med box -->

  <!-- Shelf line — subtle -->
  <line x1="148" y1="340" x2="364" y2="340"
    stroke="#c4a060" stroke-width="1.2" stroke-opacity=".2"/>

  <!-- ═══ MED BOX with + cross (LEFT) — BOLD amber on dark ═══ -->
  <rect x="152" y="210" width="90" height="72" rx="8" fill="#c4a060" opacity=".32"/>
  <rect x="170" y="204" width="54" height="10" rx="3" fill="#c4a060" opacity=".28"/>
  <!-- + cross inside med box — boldest element -->
  <rect x="183" y="234" width="26" height="7" rx="3.5" fill="#c4a060" opacity=".65"/>
  <rect x="192" y="225" width="8" height="25" rx="3.5" fill="#c4a060" opacity=".65"/>

  <!-- ═══ CHECKLIST (RIGHT) — BOLD amber on dark ═══ -->
  <rect x="266" y="210" width="88" height="110" rx="8" fill="#c4a060" opacity=".28"/>
  <rect x="278" y="226" width="8" height="8" rx="2" fill="#c4a060" opacity=".5"/>
  <line x1="292" y1="230" x2="340" y2="230" stroke="#c4a060" stroke-width="2.5" stroke-opacity=".4"/>
  <rect x="278" y="248" width="8" height="8" rx="2" fill="#c4a060" opacity=".5"/>
  <line x1="292" y1="252" x2="336" y2="252" stroke="#c4a060" stroke-width="2.5" stroke-opacity=".4"/>
  <rect x="278" y="270" width="8" height="8" rx="2" fill="#c4a060" opacity=".5"/>
  <line x1="292" y1="274" x2="332" y2="274" stroke="#c4a060" stroke-width="2.5" stroke-opacity=".4"/>
  <rect x="278" y="292" width="8" height="8" rx="2" fill="#c4a060" opacity=".42"/>
  <line x1="292" y1="296" x2="338" y2="296" stroke="#c4a060" stroke-width="2.5" stroke-opacity=".34"/>

  <!-- ═══ HEARTBEAT ECG line — BOLD amber on dark ═══ -->
  <polyline points="148,375 172,375 180,360 190,390 198,368 206,375 240,375"
    fill="none" stroke="#c4a060" stroke-width="2.5" stroke-opacity=".45"/>

  <!-- ═══ DOOR with handle — BOLD amber on dark ═══ -->
  <rect x="280" y="352" width="48" height="62" rx="5"
    fill="rgba(196,160,96,.1)" stroke="#c4a060" stroke-width="2.2" stroke-opacity=".5"/>
  <circle cx="320" cy="387" r="3.5" fill="#c4a060" opacity=".65"/>
</svg>
