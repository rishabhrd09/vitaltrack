# Render.com deployment configuration (Infrastructure as Code)
# This file allows one-click deployment via Render Blueprints
# See: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: vitaltrack-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: ./vitaltrack-backend
    region: singapore
    plan: free
    branch: main
    # Liveness-only on purpose: Render must NOT restart the instance when Neon
    # is briefly unreachable (serverless cold start / scale-to-zero). Clients
    # still probe /health for DB readiness. See test_render_health_check_uses_liveness_endpoint.
    healthCheckPath: /live
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: FRONTEND_URL
        value: https://api.carekosh.com/api/v1/auth
      # Error tracking — paste your Sentry DSN here (leave unset to disable)
      - key: SENTRY_DSN
        sync: false
