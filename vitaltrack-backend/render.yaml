# Render.com deployment configuration (Infrastructure as Code)
# This file allows one-click deployment via Render Blueprints
# See: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: vitaltrack-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: ./vitaltrack-backend
    region: singapore
    plan: free
    branch: main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually (from Neon — no query params, SSL via connect_args)
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["*"]'  # Safe for mobile-only API (CORS is a browser mechanism)
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"
      - key: FRONTEND_URL
        value: https://vitaltrack-api.onrender.com/api/v1/auth
