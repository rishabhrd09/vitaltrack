# VitalTrack CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
# PROFESSIONAL WORKFLOW: Feature Branch → Pull Request → Review → Merge to Main
# ═══════════════════════════════════════════════════════════════════════════════
#
# HOW IT WORKS:
# 1. Developer creates feature branch: git checkout -b feature/my-feature
# 2. Developer makes changes and pushes: git push origin feature/my-feature
# 3. Developer creates Pull Request on GitHub
# 4. CI runs tests automatically on the PR
# 5. Code review is required (if branch protection enabled)
# 6. All checks must pass before merge is allowed
# 7. After merge to main → Production deployment triggers
#
# BRANCH NAMING CONVENTION:
# - feature/description  → New features
# - fix/description      → Bug fixes
# - hotfix/description   → Urgent production fixes
# - docs/description     → Documentation updates
# - refactor/description → Code refactoring
#
# ═══════════════════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  # Run on ALL pull requests targeting main
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  
  # Run on push to main (after PR is merged)
  push:
    branches: [main]
  
  # Allow manual trigger
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # =============================================================================
  # BACKEND TESTS (Required for PR merge)
  # =============================================================================
  test-backend:
    name: "Backend Tests"
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vitaltrack-backend/requirements.txt
      
      - name: Install dependencies
        run: |
          cd vitaltrack-backend
          pip install -r requirements.txt
      
      - name: Run linting (Ruff)
        run: |
          cd vitaltrack-backend
          ruff check app/ tests/ scripts/ --output-format=github
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci-testing-minimum-32-chars-long
          ENVIRONMENT: testing
        run: |
          cd vitaltrack-backend
          python -m pytest tests/ -q --cov=app --cov-report=term-missing --cov-report=json
      
      - name: Verify API route count
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci-testing-minimum-32-chars-long
          ENVIRONMENT: testing
        run: |
          cd vitaltrack-backend
          python scripts/check_api_routes.py --expected 39

      - name: Verify item/order coverage floors
        run: |
          cd vitaltrack-backend
          python scripts/check_file_coverage.py coverage.json --threshold 70 \
            --file app/api/v1/items.py \
            --file app/api/v1/orders.py

  # =============================================================================
  # BACKEND TYPE CHECK (Advisory until the existing mypy baseline is green)
  # =============================================================================
  typecheck-backend-advisory:
    name: "Backend Type Check (Advisory)"
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vitaltrack-backend/requirements.txt

      - name: Install dependencies
        run: |
          cd vitaltrack-backend
          pip install -r requirements.txt

      - name: Run mypy advisory baseline
        continue-on-error: true
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci-testing-minimum-32-chars-long
          ENVIRONMENT: testing
        run: |
          cd vitaltrack-backend
          mypy app/ --ignore-missing-imports

      - name: Explain advisory type baseline
        if: always()
        run: |
          echo "mypy is advisory in this branch because the baseline is not green."
          echo "Promote it to a blocking gate only after the existing type errors are fixed."

  # =============================================================================
  # FRONTEND TESTS (Required for PR merge)
  # =============================================================================
  test-frontend:
    name: "Frontend Tests"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vitaltrack-mobile/package-lock.json
      
      - name: Install dependencies
        run: |
          cd vitaltrack-mobile
          npm install --legacy-peer-deps
      
      - name: Run TypeScript type check
        run: |
          cd vitaltrack-mobile
          npx tsc --noEmit
          echo "✅ TypeScript check passed"
      
      - name: Run ESLint
        run: |
          cd vitaltrack-mobile
          npm run lint
          echo "✅ ESLint check passed"
      
      - name: Verify Expo configuration
        run: |
          cd vitaltrack-mobile
          npx expo-doctor || echo "Expo doctor completed"

  # =============================================================================
  # SECURITY SCAN (Advisory until existing HIGH/CRITICAL findings are fixed)
  # =============================================================================
  security-scan-advisory:
    name: "Security Scan (Advisory)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Pinned to aquasecurity/trivy-action v0.36.0.
      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          version: 'v0.71.1'

      - name: Explain advisory security baseline
        if: always()
        run: |
          echo "Trivy is advisory in this branch because the baseline has existing HIGH/CRITICAL findings."
          echo "Do not treat this as clean until the dependency-upgrade follow-up is complete."

  # =============================================================================
  # PR STATUS CHECK (Gate for merging)
  # =============================================================================
  pr-check:
    name: "PR Ready to Merge"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: All checks passed
        run: |
          echo "✅ All required checks passed!"
          echo "✅ Backend tests: PASSED"
          echo "✅ Frontend tests: PASSED"
          echo ""
          echo "This PR is ready for code review and merge."

  # =============================================================================
  # DEPLOY BACKEND (Only after merge to main)
  # =============================================================================
  # Migration note: Moved from Railway to Render (free tier) in March 2026.
  # Render auto-deploys when connected to GitHub, so this job is a backup
  # trigger via deploy hook. If RENDER_DEPLOY_HOOK secret is not set,
  # Render's own GitHub integration handles deployment automatically.
  # =============================================================================
  deploy-backend:
    name: "Deploy Backend to Render"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Check for Render deploy hook
        id: check-hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "has_hook=true" >> $GITHUB_OUTPUT
          else
            echo "has_hook=false" >> $GITHUB_OUTPUT
            echo "ℹ️ RENDER_DEPLOY_HOOK not configured — Render auto-deploys from GitHub"
          fi

      - name: Trigger Render Deploy
        if: steps.check-hook.outputs.has_hook == 'true'
        run: |
          echo "🚀 Triggering Render deployment..."
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo ""
          echo "✅ Deploy triggered successfully"

      - name: Deployment summary
        run: |
          echo "🚀 Backend deployment on Render"
          echo "Platform: Render (free tier)"
          echo "Database: Neon PostgreSQL (free tier)"
          echo "URL: https://vitaltrack-api.onrender.com"

  # =============================================================================
  # BUILD MOBILE PREVIEW (Only when 'build-apk' label is added to PR)
  # =============================================================================
  # This job saves EAS build credits by only running when explicitly requested.
  # To trigger: add the 'build-apk' label to the PR on GitHub.
  # Each build uses 1 of 30 monthly free EAS credits.
  # =============================================================================
  build-preview:
    name: "Build Preview APK"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    # Only runs on PRs AND only when the 'build-apk' label is present
    if: |
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'build-apk')
    permissions:
      contents: read
      issues: write
      pull-requests: read
    defaults:
      run:
        working-directory: vitaltrack-mobile
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: vitaltrack-mobile/package-lock.json
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Setup EAS CLI
        # Pinned to expo/expo-github-action v8.2.1.
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm
      
      - name: Trigger Preview APK build on EAS
        run: eas build --profile preview --platform android --non-interactive --no-wait
      
      - name: Post build notification on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 📱 Preview APK Build Triggered',
                '',
                'Build is running on **EAS Cloud** (~15 minutes).',
                '',
                '| Detail | Value |',
                '|--------|-------|',
                '| **Backend** | `vitaltrack-api-staging.onrender.com` (staging) |',
                '| **Database** | `vitaltrack_staging` (test data only) |',
                '| **Download** | Check [EAS Builds Dashboard](https://expo.dev) |',
                '',
                '> Install the APK on your phone, register a test account, and verify the app works before merging.',
                '',
                '⚠️ *This used 1 of 30 monthly free EAS build credits.*'
              ].join('\n')
            })

  # =============================================================================
  # BUILD PRODUCTION (Only after merge to main)
  # =============================================================================
  # DISABLED: production AAB builds are turned off while we iterate on the
  # server-first refactor. To re-enable, change `if: false` back to:
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  # =============================================================================
  build-production:
    name: "Build Production AAB"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, deploy-backend]
    if: false  # disabled — was: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for Expo token
        id: check-token
        run: |
          if [ -n "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "⚠️ EXPO_TOKEN not configured - skipping build"
          fi
      
      - name: Set up Node.js
        if: steps.check-token.outputs.has_token == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Expo
        if: steps.check-token.outputs.has_token == 'true'
        # Pinned to expo/expo-github-action v8.2.1.
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm
      
      - name: Install dependencies
        if: steps.check-token.outputs.has_token == 'true'
        run: |
          cd vitaltrack-mobile
          npm install --legacy-peer-deps
      
      - name: Build Production AAB
        if: steps.check-token.outputs.has_token == 'true'
        run: |
          cd vitaltrack-mobile
          eas build --profile production --platform android --non-interactive
      
      - name: Create Release Tag
        if: steps.check-token.outputs.has_token == 'true'
        run: |
          echo "🏷️ Production build completed"
          echo "Ready for Play Store submission"
